<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLOCAD</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Montserrat', sans-serif;
    }

    .fade-in {
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Fullscreen overlay */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 2px;
      opacity: 0;
      transform: scale(0.95);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    #lightbox.active img {
      opacity: 1;
      transform: scale(1);
    }

    /* Close button */
    #lightboxClose {
      position: absolute;
      top: 20px;
      right: 28px;
      color: white;
      font-size: 28px;
      font-weight: 300;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    #lightboxClose:hover {
      opacity: 1;
    }
  </style>
</head>

<body class="bg-white text-black">

  <!-- BRAND -->
  <div class="text-center pt-10 pb-6 fade-in">
    <div class="text-[36px] font-light tracking-[0.2em]">
      CLOCAD
    </div>
    <div class="text-xs tracking-[0.4em] text-gray-400 mt-2">
      MODERN ESSENTIALS
    </div>
    <div class="mt-4 space-x-6 text-xs tracking-wide text-gray-500">
      <a href="https://instagram.com" target="_blank" class="hover:opacity-50 transition">Instagram</a>
      <a href="https://facebook.com" target="_blank" class="hover:opacity-50 transition">Facebook</a>
      <a href="https://x.com" target="_blank" class="hover:opacity-50 transition">X</a>
      <a href="https://amazon.co.jp" target="_blank" class="hover:opacity-50 transition">Amazon</a>
    </div>
  </div>

  <!-- HERO -->
  <section class="max-w-6xl mx-auto px-6 fade-in">
    <!-- GRID: natural aspect ratios preserved -->
    <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-3 gap-4">
      <script>
        for (let i = 1; i <= 9; i++) {
          document.write(`
            <img src="images/${i}.jpg"
              class="cursor-pointer w-full h-auto transition duration-500 hover:scale-105 hover:opacity-90"
              onclick="openLightbox(this)">
          `);
        }
      </script>
    </div>
  </section>

  <!-- SOCIAL -->
  <section class="text-center py-16 space-x-8 text-sm tracking-wide fade-in">
    <a href="https://instagram.com" target="_blank" class="hover:opacity-50 transition">Instagram</a>
    <a href="https://facebook.com" target="_blank" class="hover:opacity-50 transition">Facebook</a>
    <a href="https://x.com" target="_blank" class="hover:opacity-50 transition">X</a>
    <a href="https://amazon.co.jp" target="_blank" class="hover:opacity-50 transition">Amazon</a>
  </section>

  <!-- FOOTER -->
  <footer class="text-center text-xs pb-28 text-gray-500 fade-in">
    <p>contact@clocad.com</p>
    <p class="mt-1">Tokyo, Japan</p>
  </footer>

  <!-- CTA -->
  <div class="fixed bottom-0 left-0 w-full backdrop-blur-md bg-white/70 border-t text-center py-4" style="z-index: 500;">
    <a href="https://instagram.com" target="_blank"
       class="text-sm tracking-wide hover:opacity-60 transition">
      Message on Instagram
    </a>
  </div>

  <!-- LIGHTBOX OVERLAY -->
  <div id="lightbox" onclick="closeLightbox()">
    <span id="lightboxClose">&#10005;</span>
    <img id="lightboxImage" src="" onclick="event.stopPropagation()" />
  </div>

  <!-- SCRIPT -->
  <script>
    const lightbox = document.getElementById("lightbox");
    const lightboxImage = document.getElementById("lightboxImage");

    function openLightbox(img) {
      lightboxImage.src = img.src;
      lightbox.style.display = "flex";

      // Force reflow so CSS transition fires correctly
      lightbox.offsetHeight;
      lightbox.classList.add("active");

      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.classList.remove("active");
      document.body.style.overflow = "";

      setTimeout(() => {
        lightbox.style.display = "none";
        lightboxImage.src = "";
      }, 300);
    }

    document.getElementById("lightboxClose").addEventListener("click", function(e) {
      e.stopPropagation();
      closeLightbox();
    });

    // Close on Escape key
    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape") closeLightbox();
    });
  </script>

</body>
</html>
